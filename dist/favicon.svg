<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" shape-rendering="geometricPrecision">
  <defs>
    <!-- Warm copper-to-ember main gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5a07b"/>
      <stop offset="45%" stop-color="#c4623d"/>
      <stop offset="100%" stop-color="#7d3a1f"/>
    </linearGradient>
    <!-- Top-left specular highlight for glassy depth -->
    <radialGradient id="hl" cx="28%" cy="18%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- Bottom-right inner shadow for weight -->
    <radialGradient id="sh" cx="80%" cy="95%" r="60%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Plate -->
  <rect width="64" height="64" rx="16" ry="16" fill="url(#bg)"/>
  <rect width="64" height="64" rx="16" ry="16" fill="url(#sh)"/>
  <rect width="64" height="64" rx="16" ry="16" fill="url(#hl)"/>
  <!-- Hairline inner border for definition -->
  <rect x="0.5" y="0.5" width="63" height="63" rx="15.5" ry="15.5" fill="none" stroke="rgba(0,0,0,0.18)" stroke-width="1"/>
  <rect x="1.25" y="1.25" width="61.5" height="61.5" rx="14.75" ry="14.75" fill="none" stroke="rgba(255,255,255,0.16)" stroke-width="0.6"/>

  <!-- Monogram — italic 'yn' with tight kerning, font fallback chain -->
  <text
    x="32"
    y="44.5"
    text-anchor="middle"
    font-family="Fraunces, 'Cormorant Garamond', 'Times New Roman', Georgia, serif"
    font-style="italic"
    font-weight="500"
    font-size="36"
    fill="#fffaf3"
    letter-spacing="-2.2"
  >yn</text>

  <!-- Accent flourish — small dot with halo, top-right -->
  <circle cx="50" cy="14" r="2.4" fill="#fffaf3" opacity="0.95"/>
  <circle cx="50" cy="14" r="4.6" fill="none" stroke="#fffaf3" stroke-width="0.7" opacity="0.45"/>
</svg>
