<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Deep warm-black backdrop -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1816"/>
      <stop offset="100%" stop-color="#0c0b0a"/>
    </linearGradient>
    <!-- Top-right warm accent glow -->
    <radialGradient id="glow" cx="82%" cy="18%" r="55%">
      <stop offset="0%" stop-color="#f5a07b" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#c4623d" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c4623d" stop-opacity="0"/>
    </radialGradient>
    <!-- Bottom-left soft glow -->
    <radialGradient id="glow2" cx="0%" cy="100%" r="50%">
      <stop offset="0%" stop-color="#7d3a1f" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7d3a1f" stop-opacity="0"/>
    </radialGradient>
    <!-- Mark gradient (matches favicon) -->
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5a07b"/>
      <stop offset="100%" stop-color="#7d3a1f"/>
    </linearGradient>
    <radialGradient id="markHL" cx="28%" cy="18%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Backdrop -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Subtle grid lines for editorial structure -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="1">
    <line x1="80" y1="0" x2="80" y2="630"/>
    <line x1="1120" y1="0" x2="1120" y2="630"/>
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="550" x2="1200" y2="550"/>
  </g>

  <!-- Eyebrow rail -->
  <g font-family="Inter, system-ui, sans-serif" fill="#a8a29c">
    <line x1="80" y1="120" x2="120" y2="120" stroke="#a8a29c" stroke-width="1.5" opacity="0.8"/>
    <text x="135" y="126" font-size="22" letter-spacing="6" font-weight="500">PORTFOLIO &#8226; 2026</text>
  </g>

  <!-- Headline (display serif) -->
  <g font-family="Fraunces, 'Cormorant Garamond', Georgia, serif" fill="#f7f5f1">
    <text x="80" y="260" font-size="74" font-weight="400" letter-spacing="-2">Yusra</text>
    <text x="80" y="350" font-size="74" font-weight="400" font-style="italic" fill="#f0926d" letter-spacing="-2">Nadeem.</text>
  </g>

  <!-- Subheadline -->
  <g font-family="Inter, system-ui, sans-serif" fill="#cfc8c0">
    <text x="80" y="425" font-size="30" font-weight="500">Creative Coordinator &#183; Digital Marketing Strategist</text>
    <text x="80" y="468" font-size="22" font-weight="400" fill="#8a847d">Lahore, Pakistan &#183; 14+ brands &#183; 3+ years</text>
  </g>

  <!-- Brand chip rail (selected names) -->
  <g font-family="Inter, system-ui, sans-serif" fill="#cfc8c0" font-size="16" font-weight="500">
    <g transform="translate(80, 530)">
      <rect width="120" height="36" rx="18" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.12)"/>
      <text x="60" y="23" text-anchor="middle">Hybriddot</text>
    </g>
    <g transform="translate(212, 530)">
      <rect width="100" height="36" rx="18" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.12)"/>
      <text x="50" y="23" text-anchor="middle">Zlenso</text>
    </g>
    <g transform="translate(324, 530)">
      <rect width="180" height="36" rx="18" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.12)"/>
      <text x="90" y="23" text-anchor="middle">Layesha Cosmetics</text>
    </g>
    <g transform="translate(516, 530)">
      <rect width="180" height="36" rx="18" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.12)"/>
      <text x="90" y="23" text-anchor="middle">Blue World City</text>
    </g>
  </g>

  <!-- Mark (favicon-style) on the right -->
  <g transform="translate(1000, 250)">
    <rect x="-90" y="-90" width="180" height="180" rx="40" fill="url(#mark)"/>
    <rect x="-90" y="-90" width="180" height="180" rx="40" fill="url(#markHL)"/>
    <rect x="-89.5" y="-89.5" width="179" height="179" rx="39.5" fill="none" stroke="rgba(0,0,0,0.18)"/>
    <text
      x="0" y="38" text-anchor="middle"
      font-family="Fraunces, 'Cormorant Garamond', Georgia, serif"
      font-style="italic" font-weight="500" font-size="120" fill="#fffaf3" letter-spacing="-7"
    >yn</text>
    <circle cx="60" cy="-66" r="8" fill="#fffaf3" opacity="0.95"/>
    <circle cx="60" cy="-66" r="14" fill="none" stroke="#fffaf3" stroke-width="2" opacity="0.45"/>
  </g>

  <!-- URL bottom right -->
  <text x="1120" y="585" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#8a847d" letter-spacing="2">yusra-nadeem.github.io</text>
</svg>
